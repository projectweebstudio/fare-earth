<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal Login — Fly On Earth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div id="header-portal"></div>

<section class="section">
    <div class="container" style="max-width:500px;">
        <div class="auth-wrapper">
            <main class="auth-card">
                <div class="auth-card-head">
                    <h1>Welcome Back</h1>
                    <p>Sign in to access secure storage, process orders, and manage client infrastructure.</p>
                </div>

                <div id="auth-alert" class="alert-banner hidden" role="alert"></div>

                <form id="login-form" novalidate>
                    <div class="form-group">
                        <label for="email">Administrator Email</label>
                        <input type="email" id="email" autocomplete="email" placeholder="name@company.com" required>
                        <span class="field-error-msg" id="email-error">Please provide a verified administrator email.</span>
                    </div>

                    <div class="form-group">
                        <label for="password">Security Password</label>
                        <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" required>
                        <span class="field-error-msg" id="password-error">Password length must conform to structural policies.</span>
                    </div>

                    <button type="submit" id="btn-login" class="btn btn-primary btn-block">
                        <span>Secure Sign In</span>
                    </button>
                </form>

                <div class="auth-divider">
                    <span>Or Multi-Factor Auth Path</span>
                </div>

                <div class="mfa-section">
                    <button type="button" id="btn-send-otp" class="btn btn-secondary btn-block">
                        Request Secure One-Time Password (OTP)
                    </button>

                    <div id="otp-verification-zone" class="otp-zone secondary-auth-input hidden">
                        <div class="form-group">
                            <label for="otp">Security Access Token (OTP)</label>
                            <div class="otp-input-row">
                                <input type="text" id="otp" maxlength="8" placeholder="Enter security code" pattern="[0-9A-Z]+" autocomplete="one-time-code">
                                <button type="button" id="btn-verify-otp" class="btn btn-accent">Verify</button>
                            </div>
                            <span class="field-error-msg" id="otp-error">Invalid or malformed verification token structure.</span>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
</section>

<div id="footer-portal"></div>

<script src="js/config.js"></script>
<script src="js/app.js?v=2"></script>
<script src="js/admin.js"></script>
</body>
</html>
